    <!-- MENGHUBUNGKAN BOOTSTRAP 5 VIA CDN -->

        body {
            background-color: #f8f9fa;

<body>

    <div class="container py-5">
        <!-- HEADER HALAMAN -->
        <div class="text-center mb-5">
            <h1 class="fw-bold text-primary">Smart Cashier & Shopping History</h1>
            <p class="text-muted">Kelas X SMA</p>
        </div>

        <div class="row g-4">
            <!-- TUMPANG 1: MANAJEMEN KERANJANG & RIWAYAT -->
            <div class="col-md-6">
                <div class="card h-100 p-4">
                    <h4 class="fw-bold text-secondary mb-3">1. Tambah Barang Belanjaan</h4>
                    
                    <div class="input-group mb-4">
                        <input type="text" id="namaBarang" class="form-control" placeholder="Masukkan nama barang... (Contoh: Sepatu)">
                        <button class="btn btn-primary" type="button" id="btnTambah">Tambah</button>
                    </div>

                    <h5 class="fw-bold text-dark mt-2">Daftar Riwayat Keranjang:</h5>
                    <!-- AREA DISPLAY UNTUK LOOPING KODINGAN SISWA -->
                    <ul class="list-group list-group-flush border rounded p-2 bg-light" id="riwayatBelanja" style="min-height: 150px;">
                        <!-- Hasil perulangan array siswa akan muncul di sini secara dinamis -->
                    </ul>
                </div>
            </div>

            <!-- TUMPANG 2: KALKULATOR KASIR & PERCABANGAN DISKON -->
            <div class="col-md-6">
                <div class="card h-100 p-4">
                    <h4 class="fw-bold text-secondary mb-3">2. Hitung Total Pembayaran</h4>
                    
                    <div class="mb-3">
                        <label for="totalBelanja" class="form-label fw-semibold">Total Belanja Kotor (Rp)</label>
                        <input type="number" id="totalBelanja" class="form-control" placeholder="Contoh: 100000">
                    </div>

                    <div class="mb-4">
                        <label for="tipeMember" class="form-label fw-semibold">Pilih Tipe Member</label>
                        <select id="tipeMember" class="form-select">
                            <option value="Non-Member">Non-Member (Diskon 0%)</option>
                            <option value="Silver">Silver Member (Diskon 10%)</option>
                            <option value="Gold">Gold Member (Diskon 20%)</option>
                        </select>
                    </div>

                    <button class="btn btn-success w-100 fw-bold py-2 mb-4" id="btnCekTotal">Proses & Hitung Pembayaran</button>

                    <div class="alert alert-info text-center m-0">
                        <span class="fs-6 d-block text-muted">Total yang Harus Dibayar:</span>
                        <!-- AREA DISPLAY UNTUK MANIPULASI DOM OUTPUT -->
                        <h2 class="fw-bold text-dark m-0" id="hargaAkhir">Rp 0</h2>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ========================================================================= -->
    <!-- LEMBAR KERJA JAVASCRIPT: TEMPAT SISWA MENULIS KODE LOGIKA JAVASCRIPT MEREKA -->
    <!-- ========================================================================= -->

        // kemudian lakukan looping (perulangan) untuk mencetak seluruh isi array ke dalam elemen #riwayatBelanja (DOM Manipulation).

</body>
</html>
