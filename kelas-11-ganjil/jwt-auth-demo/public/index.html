<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Login & Register - JWT</title>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background-color: #1e293b;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
        }
        h2 {
            text-align: center;
            color: #38bdf8;
            margin-top: 0;
            margin-bottom: 1.5rem;
            font-size: 1.8rem;
        }
        .section {
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid #334155;
        }
        .section:last-of-type {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 12px;
            border: 1px solid #475569;
            border-radius: 8px;
            background-color: #0f172a;
            color: #f8fafc;
            font-size: 14px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #38bdf8;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #0284c7;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: background-color 0.2s, transform 0.1s;
        }
        button:hover {
            background-color: #0369a1;
        }
        button:active {
            transform: scale(0.98);
        }
        #msg {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            min-height: 20px;
            color: #f43f5e;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="section">
            <h2>Daftar Akun (Register)</h2>
            <input id="regUsername" placeholder="Username baru">
            <input id="regPassword" type="password" placeholder="Password baru">
            <button onclick="register()">Register</button>
        </div>

        <div class="section">
            <h2>Masuk (Login)</h2>
            <input id="username" placeholder="Username Anda">
            <input id="password" type="password" placeholder="Password Anda">
            <button onclick="login()">Login</button>
        </div>

        <p id="msg"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
